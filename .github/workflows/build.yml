name: Build Universal Geode Mod

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release
      - name: Upload Windows Binary
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: build/maBot.dll

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release
      - name: Upload macOS Binary
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: build/maBot.dylib

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure iOS
        run: cmake -B build -DCMAKE_SYSTEM_NAME=iOS -DCMAKE_BUILD_TYPE=Release
      - name: Build iOS
        run: cmake --build build --config Release
      - name: Upload iOS Geode
        uses: actions/upload-artifact@v4
        with:
          name: ios
          path: build/MahdiAhmedMC.maBot.geode

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y cmake g++
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release
      - name: Upload Linux Binary
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: build/maBot.so

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
      - name: Configure Android
        run: cmake -B build -DCMAKE_SYSTEM_NAME=Android -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a -DCMAKE_BUILD_TYPE=Release
      - name: Build Android
        run: cmake --build build --config Release
      - name: Upload Android Binary
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: build/maBot.so

  combine:
    needs: [windows, macos, ios, linux, android]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract iOS base .geode
        run: |
          mkdir universal
          cd universal
          unzip ../artifacts/ios/MahdiAhmedMC.maBot.geode

      - name: Insert all binaries into root
        run: |
          cp artifacts/windows/maBot.dll universal/
          cp artifacts/macos/maBot.dylib universal/
          cp artifacts/linux/maBot.so universal/linux.so
          cp artifacts/android/maBot.so universal/android.so

      - name: Repack universal .geode
        run: |
          cd universal
          zip -r ../MahdiAhmedMC.maBot.geode .

      - name: Upload Universal Geode
        uses: ncipollo/release-action@v1
        with:
          artifacts: "MahdiAhmedMC.maBot.geode"
          token: ${{ secrets.GITHUB_TOKEN }}
