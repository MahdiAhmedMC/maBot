name: Build Geode mod

on:
  workflow_dispatch:
  push:
    branches:
      - "main"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: Windows
          os: windows-latest

        - name: macOS
          os: macos-latest

        - name: Android32
          os: ubuntu-latest
          target: Android32

        - name: Android64
          os: ubuntu-latest
          target: Android64

        - name: iOS
          os: macos-latest
          target: iOS

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          sdk: "5.6.1"
          build-config: Release
          combine: false
          target: ${{ matrix.config.target }}

      - name: Upload platform build
        uses: actions/upload-artifact@v4
        with:
          name: platform-builds
          path: ${{ steps.build.outputs.build-output }}

  package:
    name: Package builds
    runs-on: ubuntu-latest
    needs: ['build']

    steps:
      - name: Download all platform builds
        uses: actions/download-artifact@v4
        with:
          name: platform-builds
          path: builds

      - name: Combine builds
        uses: geode-sdk/build-geode-mod/combine@main
        id: combine
        with:
          input: builds

      - name: Rename final .geode
        run: |
          mkdir final
          cp "${{ steps.combine.outputs.build-output }}" "final/MahdiAhmedMC.maBot.geode"

      - name: Upload final .geode
        uses: actions/upload-artifact@v4
        with:
          name: Build Output
          path: final/MahdiAhmedMC.maBot.geode
