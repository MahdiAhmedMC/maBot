name: Build Universal Geode Mod

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Geode SDK
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/geode-sdk/geode/releases/latest/download/geode-sdk.zip" -OutFile "geode-sdk.zip"
          New-Item -ItemType Directory -Path "sdk-temp" | Out-Null
          Expand-Archive -Path "geode-sdk.zip" -DestinationPath "sdk-temp" -Force

          if (Test-Path "sdk-temp/geode-sdk") {
            Move-Item "sdk-temp/geode-sdk" "geode-sdk"
          } else {
            Move-Item "sdk-temp" "geode-sdk"
          }

          Add-Content -Path $env:GITHUB_ENV -Value "GEODE_SDK=$PWD/geode-sdk"

      - name: Install CPM
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/cpm-cmake/CPM.cmake/releases/latest/download/CPM.cmake" -OutFile "CPM.cmake"
          Add-Content -Path $env:GITHUB_ENV -Value "CPM_SOURCE=$PWD/CPM.cmake"

      - name: Configure
        shell: pwsh
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release

      - name: Upload Windows Binary
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: build/maBot.dll

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Geode SDK
        run: |
          curl -L https://github.com/geode-sdk/geode/releases/latest/download/geode-sdk.zip -o geode-sdk.zip
          mkdir sdk-temp
          unzip geode-sdk.zip -d sdk-temp

          if [ -d "sdk-temp/geode-sdk" ]; then
            mv sdk-temp/geode-sdk geode-sdk
          else
            mv sdk-temp geode-sdk
          fi

          echo "GEODE_SDK=$PWD/geode-sdk" >> $GITHUB_ENV

      - name: Install CPM
        run: |
          curl -L https://github.com/cpm-cmake/CPM.cmake/releases/latest/download/CPM.cmake -o CPM.cmake
          echo "CPM_SOURCE=$PWD/CPM.cmake" >> $GITHUB_ENV

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Upload macOS Binary
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: build/maBot.dylib

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Geode SDK
        run: |
          curl -L https://github.com/geode-sdk/geode/releases/latest/download/geode-sdk.zip -o geode-sdk.zip
          mkdir sdk-temp
          unzip geode-sdk.zip -d sdk-temp

          if [ -d "sdk-temp/geode-sdk" ]; then
            mv sdk-temp/geode-sdk geode-sdk
          else
            mv sdk-temp geode-sdk
          fi

          echo "GEODE_SDK=$PWD/geode-sdk" >> $GITHUB_ENV

      - name: Install CPM
        run: |
          curl -L https://github.com/cpm-cmake/CPM.cmake/releases/latest/download/CPM.cmake -o CPM.cmake
          echo "CPM_SOURCE=$PWD/CPM.cmake" >> $GITHUB_ENV

      - name: Configure iOS
        run: |
          cmake -B build \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build iOS
        run: cmake --build build --config Release

      - name: Upload iOS Geode
        uses: actions/upload-artifact@v4
        with:
          name: ios
          path: build/MahdiAhmedMC.maBot.geode

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Geode SDK
        run: |
          curl -L https://github.com/geode-sdk/geode/releases/latest/download/geode-sdk.zip -o geode-sdk.zip
          mkdir sdk-temp
          unzip geode-sdk.zip -d sdk-temp

          if [ -d "sdk-temp/geode-sdk" ]; then
            mv sdk-temp/geode-sdk geode-sdk
          else
            mv sdk-temp geode-sdk
          fi

          echo "GEODE_SDK=$PWD/geode-sdk" >> $GITHUB_ENV

      - name: Install CPM
        run: |
          curl -L https://github.com/cpm-cmake/CPM.cmake/releases/latest/download/CPM.cmake -o CPM.cmake
          echo "CPM_SOURCE=$PWD/CPM.cmake" >> $GITHUB_ENV

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y cmake g++

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Upload Linux Binary
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: build/maBot.so

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Geode SDK
        run: |
          curl -L https://github.com/geode-sdk/geode/releases/latest/download/geode-sdk.zip -o geode-sdk.zip
          mkdir sdk-temp
          unzip geode-sdk.zip -d sdk-temp

          if [ -d "sdk-temp/geode-sdk" ]; then
            mv sdk-temp/geode-sdk geode-sdk
          else
            mv sdk-temp geode-sdk
          fi

          echo "GEODE_SDK=$PWD/geode-sdk" >> $GITHUB_ENV

      - name: Install CPM
        run: |
          curl -L https://github.com/cpm-cmake/CPM.cmake/releases/latest/download/CPM.cmake -o CPM.cmake
          echo "CPM_SOURCE=$PWD/CPM.cmake" >> $GITHUB_ENV

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Configure Android
        run: |
          cmake -B build \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_ANDROID_NDK=$ANDROID_NDK_HOME \
            -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a \
            -DCMAKE_ANDROID_STL_TYPE=c++_static \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build Android
        run: cmake --build build --config Release

      - name: Upload Android Binary
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: build/maBot.so

  combine:
    needs: [windows, macos, ios, linux, android]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract iOS base .geode
        run: |
          mkdir universal
          cd universal
          unzip ../artifacts/ios/MahdiAhmedMC.maBot.geode

      - name: Insert all binaries into root
        run: |
          cp artifacts/windows/maBot.dll universal/
          cp artifacts/macos/maBot.dylib universal/
          cp artifacts/linux/maBot.so universal/linux.so
          cp artifacts/android/maBot.so universal/android.so

      - name: Repack universal .geode
        run: |
          cd universal
          zip -r ../MahdiAhmedMC.maBot.geode .

      - name: Upload Universal Geode
        uses: ncipollo/release-action@v1
        with:
          artifacts: "MahdiAhmedMC.maBot.geode"
          token: ${{ secrets.GITHUB_TOKEN }}
