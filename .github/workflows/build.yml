name: Build maBot

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - 'docs/*.md'
      - 'README.md'
      - 'previews/**'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest
            build-config: RelWithDebInfo

          - name: macOS
            os: macos-latest

          - name: iOS
            os: macos-latest
            target: iOS

          - name: Android32
            os: ubuntu-latest
            target: Android32

          - name: Android64
            os: ubuntu-latest
            target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          sdk: '5.6.1'
          build-config: ${{ matrix.config.build-config || 'Release' }}
          configure-args: ''
          export-pdb: true
          export-symbols: true
          combine: true
          target: ${{ matrix.config.target }}
          ccache-variant: ${{ matrix.config.os != 'macos-latest' && 'sccache' || '' }}

  package:
    name: Package builds
    runs-on: ubuntu-latest
    needs: build
    permissions: write-all

    steps:
      - name: Combine builds
        uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - name: Rename final .geode
        run: |
          mkdir final
          cp "${{ steps.build.outputs.build-output }}/"*.geode "final/MahdiAhmedMC.maBot.geode"

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: mabot-build-output
          path: final
