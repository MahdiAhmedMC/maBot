name: Release geode mod

on:
  push:
    tags:
      - "v*"

jobs:

  # -------------------------
  # macOS + iOS build
  # -------------------------
  apple:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          brew install cmake ninja

      - name: Download Geode SDK
        run: |
          git clone https://github.com/geode-sdk/geode.git --depth=1
          echo "GEODE_SDK=$(pwd)/geode" >> $GITHUB_ENV

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja -DGEODE_SDK=$GEODE_SDK

      - name: Build (macOS + iOS)
        run: |
          cmake --build build --config Release

      - name: Package
        run: |
          cmake --build build --target package

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: geode-apple
          path: build/*.geode


  # -------------------------
  # Windows build
  # -------------------------
  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: choco install cmake ninja

      - name: Download Geode SDK
        run: |
          git clone https://github.com/geode-sdk/geode.git --depth=1
          echo "GEODE_SDK=$pwd\\geode" >> $env:GITHUB_ENV

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja -DGEODE_SDK=$env:GEODE_SDK

      - name: Build (Windows)
        run: |
          cmake --build build --config Release

      - name: Package
        run: |
          cmake --build build --target package

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: geode-windows
          path: build/*.geode


  # -------------------------
  # Linux build
  # -------------------------
  linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build clang

      - name: Download Geode SDK
        run: |
          git clone https://github.com/geode-sdk/geode.git --depth=1
          echo "GEODE_SDK=$(pwd)/geode" >> $GITHUB_ENV

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja -DGEODE_SDK=$GEODE_SDK

      - name: Build (Linux)
        run: |
          cmake --build build --config Release

      - name: Package
        run: |
          cmake --build build --target package

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: geode-linux
          path: build/*.geode


  # -------------------------
  # Android build
  # -------------------------
  android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build unzip wget

      - name: Install Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip android-ndk-r26d-linux.zip
          echo "ANDROID_NDK=$(pwd)/android-ndk-r26d" >> $GITHUB_ENV

      - name: Download Geode SDK
        run: |
          git clone https://github.com/geode-sdk/geode.git --depth=1
          echo "GEODE_SDK=$(pwd)/geode" >> $GITHUB_ENV

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DGEODE_SDK=$GEODE_SDK \
            -DANDROID_NDK=$ANDROID_NDK \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24

      - name: Build (Android)
        run: |
          cmake --build build --config Release

      - name: Package
        run: |
          cmake --build build --target package

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: geode-android
          path: build/*.geode
